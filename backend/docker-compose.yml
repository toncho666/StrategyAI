version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8020:8020"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - API_HOST=0.0.0.0
      - API_PORT=8020
      - API_RELOAD=False
    volumes:
      - ./:/app
      - /var/log/app:/var/log/app